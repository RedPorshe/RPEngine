name: Linux build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TARGETS: KuzbassEngine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60 
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v4
    
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libvulkan-dev \
            vulkan-validationlayers \
            mesa-vulkan-drivers
    
      - name: Install Conan
        run: |
          pip install conan
          conan --version
    
      - name: Create Conan profile
        run: |
          conan profile detect --force
          sed -i 's/compiler.cppstd=gnu17/compiler.cppstd=20/' /home/runner/.conan2/profiles/default
          sed -i 's/compiler.version=13/compiler.version=11/' /home/runner/.conan2/profiles/default
    
      - name: Install dependencies with Conan
        run: |
          BUILD_CONFIG=$(echo "${{matrix.configuration}}" | tr '[:upper:]' '[:lower:]')
          conan install . --build=missing \
            -s build_type=${{matrix.configuration}} \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True
    
      - name: Configure CMake
        run: |
          BUILD_CONFIG=$(echo "${{matrix.configuration}}" | tr '[:upper:]' '[:lower:]')
          cmake --preset conan-${BUILD_CONFIG}
    
      - name: Build
        run: |
          cd build/${{matrix.configuration}}
          cmake --build . --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}


      - name: Archive Artifacts
        run: |
          mkdir -p artifacts
          cp build/${{matrix.configuration}}/${{env.TARGETS}} artifacts/ || true
          zip -r artifacts-${{matrix.configuration}}.zip artifacts/
    
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.zip

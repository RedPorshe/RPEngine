name: Linux build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TARGETS: KuzbassEngine

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v4
    
      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Установка всех необходимых X11 библиотек для GLFW и xorg/system
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libx11-xcb-dev \
            libfontenc-dev \
            libice-dev \
            libsm-dev \
            libxau-dev \
            libxaw7-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxkbfile-dev \
            libxmu-dev \
            libxmuu-dev \
            libxpm-dev \
            libxres-dev \
            libxss-dev \
            libxt-dev \
            libxtst-dev \
            libxv-dev \
            libxxf86vm-dev \
            libxcb-glx0-dev \
            libxcb-render0-dev \
            libxcb-render-util0-dev \
            libxcb-xkb-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-dri3-dev \
            uuid-dev \
            libxcb-cursor-dev \
            libxcb-dri2-0-dev \
            libxcb-present-dev \
            libxcb-composite0-dev \
            libxcb-ewmh-dev \
            libxcb-res0-dev
          # Vulkan dependencies
          sudo apt-get install -y \
            libvulkan-dev \
            vulkan-validationlayers \
            mesa-vulkan-drivers
    
      - name: Install Conan
        run: |
          pip install conan
          conan --version
    
      - name: Create Conan profile
        run: |
          conan profile detect --force
          # Редактируем профиль для наших настроек
          sed -i 's/compiler.cppstd=gnu17/compiler.cppstd=20/' /home/runner/.conan2/profiles/default
          sed -i 's/compiler.version=13/compiler.version=11/' /home/runner/.conan2/profiles/default
          cat /home/runner/.conan2/profiles/default
    
      - name: Install dependencies with Conan
        run: |
          conan install . --build=missing \
            -s build_type=${{matrix.configuration}} \
            -c tools.system.package_manager:mode=install \
            -c tools.system.package_manager:sudo=True
    
      - name: Configure CMake
        run: |
          cmake --preset conan-default
    
      - name: Build
        run: |
          cmake --build build --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}
    
      - name: Archive Artifacts
        run: |
          mkdir -p artifacts
          find build -name "${{env.TARGETS}}" -type f -exec cp {} artifacts/ \;
          zip -r artifacts-${{matrix.configuration}}.zip artifacts/
    
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.zip
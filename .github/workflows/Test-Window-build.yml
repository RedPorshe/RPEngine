name: Test Windows build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TARGETS: KuzbassEngine

jobs:
  build:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: |
         python -m pip install --upgrade pip
         pip install conan

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.243
          cache: true

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{matrix.configuration}} `
            -DVulkan_ROOT="$env:VULKAN_SDK"

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}

      - name: Archive Artifacts
        run: Compress-Archive -Path build/bin/${{matrix.configuration}}/* -DestinationPath artifacts-${{matrix.configuration}}.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.zip
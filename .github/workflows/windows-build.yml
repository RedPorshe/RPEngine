name: Windows build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TARGETS: KuzbassEngine

jobs:
  build:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v4


      - name: Install Vulkan SDK
        run: |
          curl -L -o VulkanSDK.exe "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          ./VulkanSDK.exe /S
          echo "C:\VulkanSDK\1.3.296.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Vulkan installation
        run: |
          vulkaninfo --summary
          Get-ChildItem "C:\VulkanSDK\" -Recurse -Filter "vulkan.h" | Select-Object FullName

      - name: Install Conan
        run: pip install conan

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.configuration}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}

      - name: Archive Artifacts
        run: Compress-Archive -Path build/bin/* -DestinationPath artifacts-${{matrix.configuration}}.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.zip

name: Windows build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TARGETS: LifeExeEngine

jobs:
  build:
    runs-on: windows-2025-vs2026
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: pip install conan

      - name: Setup Vulkan SDK
        run: |
          $VULKAN_VERSION = "1.3.243.0"
          $INSTALLER_URL = "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/windows/VulkanSDK-${VULKAN_VERSION}-Installer.exe"
          $INSTALLER_PATH = "$env:TEMP\VulkanSDKInstaller.exe"
          Invoke-WebRequest -Uri $INSTALLER_URL -OutFile $INSTALLER_PATH
          Start-Process -FilePath $INSTALLER_PATH -ArgumentList "/S" -Wait -NoNewWindow
          echo "VULKAN_SDK=C:\VulkanSDK\${VULKAN_VERSION}" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\${VULKAN_VERSION}\Bin" >> $env:GITHUB_PATH
     
      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.configuration}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}

      - name: Archive Artifacts
        run: Compress-Archive -Path build/bin/* -DestinationPath artifacts-${{matrix.configuration}}.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.zip
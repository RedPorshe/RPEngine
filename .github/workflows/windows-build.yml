name: Windows build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  TARGETS: KuzbassEngine
  TEST_TARGET: KuzbassEngineTests

jobs:
  build:
    runs-on: windows-latest  # Изменено с windows-2025-vs2026 на windows-latest
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v4
    
      - name: Install Conan
        run: |
          pip install conan
          conan --version
    
      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-version: 1.3.243.0
    
      - name: Configure Conan profile
        run: |
          conan profile detect --force
          conan profile update settings.compiler=msvc default
          conan profile update settings.compiler.version=193 default
          conan profile update settings.compiler.cppstd=20 default
          conan profile update settings.compiler.runtime=dynamic default
          conan profile update settings.build_type=${{matrix.configuration}} default
    
      - name: Install dependencies with Conan
        run: |
          conan install . --build=missing -s build_type=${{matrix.configuration}}
    
      - name: Configure CMake
        run: |
          cmake --preset conan-default -DCMAKE_BUILD_TYPE=${{matrix.configuration}}
    
      - name: Build Engine
        run: |
          cmake --build build --config ${{matrix.configuration}} -v --target ${{env.TARGETS}}
    
      - name: Build Tests
        run: |
          cmake --build build --config ${{matrix.configuration}} -v --target ${{env.TEST_TARGET}}
    
      - name: Run Tests (Debug only)
        if: matrix.configuration == 'Debug'
        run: |
          build/bin/Debug/${{env.TEST_TARGET}}.exe --gtest_output=xml:test-results.xml
    
      - name: Upload Test Results (Debug)
        if: matrix.configuration == 'Debug'
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: test-results.xml
    
      - name: Publish Test Report (Debug)
        if: matrix.configuration == 'Debug'
        uses: phoenix-actions/test-reporting@v10
        with:
          name: Windows Test Results
          path: test-results.xml
          reporter: java-junit
          output-to: "step-summary"
          fail-on-error: "true"
    
      - name: Archive Artifacts
        run: |
          Compress-Archive -Path build/bin/* -DestinationPath artifacts-${{matrix.configuration}}.zip
    
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.zip